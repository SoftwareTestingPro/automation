    <main class="card">
        <div class="card-content">
        <h1>Multiple Drag and Drop</h1>
        <p class="lead">Master complex drag-and-drop! Drag all images to their matching drop zones to demonstrate advanced element manipulation skills.</p>

    <div class="drop-container" id="dropContainer">
        <!-- Drop zones will be generated here -->
    </div>

    <div class="drag-drop-images">
        <img src="../../img/1067-100x100.jpg" alt="Image 1" width="100" height="100" draggable="true" id="img1">
        <img src="../../img/590-120x150.jpg" alt="Image 2" width="150" height="200" draggable="true" id="img2">
        <img src="../../img/318-150x200.jpg" alt="Image 3" width="120" height="150" draggable="true" id="img3">
        <img src="../../img/837-200x100.jpg" alt="Image 4" width="200" height="100" draggable="true" id="img4">
    </div>

    <div class="message success" id="successMessage" role="status" aria-live="polite">All images successfully dropped!</div>
            <div id="failureMessage" class="message failure" role="status" aria-live="polite">Incorrect! Please try again.</div>
    <div class="message info" id="infoMessage" role="status" aria-live="polite"></div>
        </div>
    </main>
</div>

<div id="footer-placeholder"></div>

    <script>
        const images = [
            { id: 'img1', width: 100, height: 100 },
            { id: 'img2', width: 150, height: 200 },
            { id: 'img3', width: 120, height: 150 },
            { id: 'img4', width: 200, height: 100 }
        ];

        const dropContainer = document.getElementById('dropContainer');
        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');
        const infoMessage = document.getElementById('infoMessage');
        
        let droppedCount = 0;

        // Hide messages on load
        successMessage.style.display = 'none';
        failureMessage.style.display = 'none';
        infoMessage.style.display = 'none';

        // Separate the first image
        const firstImage = images[0];

        // Shuffle the rest of the images array
        const shuffledImages = images.slice(1).sort(() => Math.random() - 0.5);

        // Insert the first image as the third item
        shuffledImages.splice(2, 0, firstImage);

        // Create drop zones based on the updated shuffled images array
        shuffledImages.forEach(image => {
            const dropZone = document.createElement('div');
            dropZone.classList.add('drop-zone');
            dropZone.setAttribute('data-width', image.width);
            dropZone.setAttribute('data-height', image.height);
            dropZone.style.width = `${image.width}px`;
            dropZone.style.height = `${image.height}px`;

            const sizeText = document.createElement('span');
            sizeText.textContent = `${image.width} x ${image.height}`;
            dropZone.appendChild(sizeText);

            dropContainer.appendChild(dropZone);

            // Event listeners for drag and drop
            dropZone.addEventListener('dragover', event => {
                event.preventDefault();
            });

            dropZone.addEventListener('drop', event => {
                event.preventDefault();
                const imageId = event.dataTransfer.getData('text/plain');
                const draggedImage = document.getElementById(imageId);

                if (
                    parseInt(draggedImage.width) === parseInt(dropZone.dataset.width) &&
                    parseInt(draggedImage.height) === parseInt(dropZone.dataset.height)
                ) {
                    if (!dropZone.hasChildNodes() || dropZone.childElementCount === 1) {
                        dropZone.innerHTML = '';
                        dropZone.appendChild(draggedImage);
                        droppedCount++;
                        failureMessage.style.display = 'none';
                        
                        if (droppedCount === 4) {
                            infoMessage.style.display = 'none';
                            successMessage.style.display = 'flex';
                        } else {
                            infoMessage.style.display = 'flex';
                            infoMessage.textContent = `Progress: ${droppedCount} of 4 images dropped.`;
                        }
                    } else {
                        failureMessage.style.display = 'flex';
                        failureMessage.textContent = 'This drop zone already has an image.';
                    }
                } else {
                    failureMessage.style.display = 'flex';
                    failureMessage.textContent = 'This image doesn’t match the drop area size.';
                }
            });
        });

        // Add dragstart event to images
        images.forEach(imageData => {
            const image = document.getElementById(imageData.id);
            image.addEventListener('dragstart', event => {
                event.dataTransfer.setData('text/plain', event.target.id);
            });
        });
    </script>
