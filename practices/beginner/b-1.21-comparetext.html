        <main class="card">
            <div class="card-content">
                <h1>Text Comparison</h1>
                <p class="lead">Master text comparison logic! Analyze the two texts below and determine if they match perfectly to prove your validation skills.</p>
                <div class="text-container" style="display: flex; gap: 20px; justify-content: center;">
                    <div class="text-item" style="border: 1px solid #ddd; padding: 15px; border-radius: 8px; background: #f9f9f9; width: 200px;">
                        <div class="text-label">Text 1:</div>
                        <div id="text1" class="value-box"></div>
                    </div>
                    <div class="text-item" style="border: 1px solid #ddd; padding: 15px; border-radius: 8px; background: #f9f9f9; width: 200px;">
                        <div class="text-label">Text 2:</div>
                        <div id="text2" class="value-box"></div>
                    </div>
                </div>

                <div class="button-container" style="display: flex; gap: 10px; justify-content: center; margin-top: 20px;">
                    <button onclick="checkAnswer(true)" style="padding: 10px 20px; background: #4caf50; color: white; border: none; border-radius: 5px; cursor: pointer;">Yes</button>
                    <button onclick="checkAnswer(false)" style="padding: 10px 20px; background: #f44336; color: white; border: none; border-radius: 5px; cursor: pointer;">No</button>
                </div>
                <div class="message success" id="successMessage" role="status" aria-live="polite">Correct! The comparison is accurate.</div>
                <div class="message failure" id="failureMessage" role="status" aria-live="polite">Incorrect! Please analyze the texts again.</div>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        const text1Element = document.getElementById('text1');
        const text2Element = document.getElementById('text2');
        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');

        const texts = ["Hello", "World", "Text", "Example", "Random", "Comparison"];

        function setRandomTexts() {
            const randomText1 = texts[Math.floor(Math.random() * texts.length)];
            const randomText2 = Math.random() > 0.5 ? randomText1 : texts[Math.floor(Math.random() * texts.length)];
            text1Element.textContent = randomText1;
            text2Element.textContent = randomText2;
        }

        function checkAnswer(isTrueSelected) {
            const text1 = text1Element.textContent;
            const text2 = text2Element.textContent;
            const isSuccess = (text1 === text2 && isTrueSelected) || (text1 !== text2 && !isTrueSelected);

            if (isSuccess) {
                successMessage.style.display = 'flex';
                failureMessage.style.display = 'none';
            } else {
                successMessage.style.display = 'none';
                failureMessage.style.display = 'flex';
            }
        }

        setRandomTexts();
        successMessage.style.display = 'none';
        failureMessage.style.display = 'none';
    </script>
