            <div class="card-content">
                <h1>Right Click Action</h1>
                <p class="lead">Master context menu automation! Execute a precise right-click on the button below to unlock advanced interaction techniques.</p>
                <div class="button-enabled">
                    <button id="clickButton" type="button">Click Me</button>
                </div>
                <div class="message success" id="successMessage" role="status" aria-live="polite">Correct! You successfully right-clicked the button.</div>
                <div class="message failure" id="failureMessage" role="status" aria-live="polite">Incorrect! It looks like you single-clicked the button.</div>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        const clickButton = document.getElementById('clickButton');
        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');

        clickButton.addEventListener('click', (event) => {
            // Show failure message for left-click
            failureMessage.style.display = 'flex';
            successMessage.style.display = 'none';
        });

        clickButton.addEventListener('contextmenu', (event) => {
            event.preventDefault(); // Prevent the default right-click menu
            successMessage.style.display = 'flex';
            failureMessage.style.display = 'none';
        });

        //Hide messages initially
        successMessage.style.display = 'none';
        failureMessage.style.display = 'none';
    </script>
