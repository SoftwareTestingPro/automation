                <h1>Text Highlight Example</h1>
                <p class="lead">Master JavaScript execution! Use automation to highlight the second text element with matching yellow background styling.</p>
                <div class="text-section">
                    <span class="highlight-text">This is Highlighted text.</span>
                </div>
                <div class="text-section">
                    <span id="textToHighlight">Highlight this text same as above.</span>
                </div>

    <script>
        // Function to highlight text - to be called by automation script
        function highlightSecondText() {
            var textToHighlight = document.getElementById("textToHighlight");
            var successMessage = document.getElementById("successMessage");
            
            textToHighlight.classList.add("highlight-text");
            successMessage.style.display = "flex";
        }

        // Hide message on page load
        document.addEventListener('DOMContentLoaded', function() {
            var successMessage = document.getElementById("successMessage");
            successMessage.style.display = "none";
        });
    </script>
