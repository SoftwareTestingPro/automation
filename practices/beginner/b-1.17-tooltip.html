        <main class="card">
            <div class="card-content">
                <h1>Tooltip Validation</h1>
                <p class="lead">Master tooltip interaction! Hover over the rainbow text to reveal hidden messages, then capture and input the tooltip text precisely.</p>

                <div style="text-align: center; margin-bottom: 20px;">
                    <div class="rainbow-text" data-tooltip="I am a Tooltip">
                        Hover Me For Tooltip
                    </div>
                </div>

                <div class="horizontal-form">
                    <label for="inputField">Enter the tooltip text:</label>
                    <input type="text" id="inputField" placeholder="Enter the tooltip text here">
                </div>
                <div class="message success" id="successMessage" role="status" aria-live="polite">Correct! Tooltip text matched.</div>
                <div class="message failure" id="failureMessage" role="status" aria-live="polite">
                    Incorrect! Tooltip text does not match.
                    <div class="detail">Expected: <span id="expectedValue"></span> | Entered: <span id="actualValue"></span></div>
                </div>
            </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        const inputField = document.getElementById('inputField');
        const successMessage = document.getElementById('successMessage');
        const failureMessage = document.getElementById('failureMessage');
        const expectedValueDisplay = document.getElementById('expectedValue');
        const actualValueDisplay = document.getElementById('actualValue');

        const tooltipText = document.querySelector('.rainbow-text').getAttribute('data-tooltip');
        expectedValueDisplay.textContent = tooltipText;

        inputField.addEventListener('input', function() {
            const userInput = inputField.value;
            actualValueDisplay.textContent = userInput;

            if (userInput === tooltipText) {
                successMessage.style.display = 'flex';
                failureMessage.style.display = 'none';
            } else if (userInput) {
                successMessage.style.display = 'none';
                failureMessage.style.display = 'flex';
            } else {
                successMessage.style.display = 'none';
                failureMessage.style.display = 'none';
            }
        });

        // Hide messages initially
        successMessage.style.display = 'none';
        failureMessage.style.display = 'none';
    </script>
